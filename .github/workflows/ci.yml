name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Docker Compose interpolates every service in the file before running
      # any command, so this must be set even for steps that only touch
      # "app" -- "web" requires it too. Smoke-test value only: this build
      # isn't run or deployed, so any syntactically valid URL works.
      VITE_CONVEX_URL: https://ci-build-placeholder.convex.cloud
    steps:
      - uses: actions/checkout@v4

      - name: Build CI image
        run: docker compose build app

      - name: Typecheck
        run: docker compose run --rm app npm run typecheck

      - name: Lint
        run: docker compose run --rm app npm run lint

      - name: Test
        run: docker compose run --rm app npm test

      - name: Build
        run: docker compose run --rm app npm run build

      - name: Build production image
        run: docker compose build web

  deploy-convex:
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Deploy to Convex
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
