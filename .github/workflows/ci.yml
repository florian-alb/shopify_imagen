name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      VITE_CONVEX_URL: https://ci-build-placeholder.convex.cloud
    steps:
      - uses: actions/checkout@v4

      - name: Build CI image
        run: docker compose build app

      - name: Typecheck
        run: docker compose run --rm app npm run typecheck

      - name: Lint
        run: docker compose run --rm app npm run lint

      - name: Test
        run: docker compose run --rm app npm test

      - name: Build
        run: docker compose run --rm app npm run build

      - name: Build production image
        run: docker compose build web

  deploy-convex-dev:
    needs: verify
    if: github.base_ref == 'dev' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Deploy to Convex dev
        run: npx convex deploy --preview-name dev
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEV_DEPLOY_KEY }}

  deploy-convex-prod:
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Deploy to Convex prod
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
