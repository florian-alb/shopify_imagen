# Validate that PRs are only opened from the dev branch to the main branch of this repository.

name: Validate PR source

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review

permissions:
  contents: read

jobs:
  validate-pr-source:
    name: validate-pr-source
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR source
        env:
          BASE_BRANCH: ${{ github.base_ref }}
          HEAD_BRANCH: ${{ github.head_ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          CURRENT_REPO: ${{ github.repository }}
        run: |
          echo "Base branch: $BASE_BRANCH"
          echo "Head branch: $HEAD_BRANCH"
          echo "Head repo: $HEAD_REPO"
          echo "Current repo: $CURRENT_REPO"

          if [ "$BASE_BRANCH" != "main" ]; then
            echo "PR targets '$BASE_BRANCH', not main. No restriction."
            exit 0
          fi

          if [ "$HEAD_BRANCH" != "dev" ]; then
            echo "::error::Only PRs from dev to main are allowed."
            exit 1
          fi

          if [ "$HEAD_REPO" != "$CURRENT_REPO" ]; then
            echo "::error::Only the dev branch from this repository is allowed."
            exit 1
          fi

          echo "Valid PR: dev -> main"
